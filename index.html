/* ═══════════════════════════════════════════════════════════
   FINANCIAL ENGINE  (matches Excel logic exactly)
═══════════════════════════════════════════════════════════ */
function buildMonths(products, cfg) {
  const active = products.filter(p => p.active);
  return Array.from({ length: 12 }, (_, i) => {
    const g = Math.pow(1 + cfg.growthRate, i);
    let rev = 0, units = 0, fba = 0;
    active.forEach(p => {
      const u = p.unitsM1 * g;
      rev   += u * p.price;
      units += u;
      fba   += u * p.fbaFee;
    });
    const mktg    = rev * cfg.mktgPct;
    const amzFee  = rev * cfg.amzFeePct;
    const agency  = cfg.agencyFee;
    const memb    = cfg.membership;
    const costs   = mktg + amzFee + fba + agency + memb;
    const net     = rev - costs;
    const tax     = Math.max(0, net * cfg.taxRate);
    return {
      m: i+1, label: `Mes ${i+1}`,
      rev, units: Math.round(units), mktg, amzFee, fba, agency, memb,
      costs, net, tax, netTax: net - tax,
      margin: rev > 0 ? net / rev : 0,
      roas: cfg.mktgPct > 0 ? 1 / cfg.mktgPct : 0
    };
  });
}

function calcUnitMargin(p, cfg) {
  if (!p.price || !p.cost) return null;
  const mktg   = p.price * cfg.mktgPct;
  const amzFee = p.price * cfg.amzFeePct;
  const totalC = p.cost + p.fbaFee + mktg + amzFee;
  const profit = p.price - totalC;
  return { profit, margin: profit/p.price, roi: p.cost > 0 ? profit/p.cost : 0 };
}

/* ═══════════════════════════════════════════════════════════
   SUPPLIER ANALYZER
═══════════════════════════════════════════════════════════ */
const SupplierAnalyzer = ({ sim, onChange, apiKey }) => {
  const [urls,    setUrls]    = useState(['']);
  const [results, setResults] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error,   setError]   = useState('');

  const updUrl = (i,v) => setUrls(u=>u.map((x,j)=>j===i?v:x));
  const rmUrl  = i => setUrls(u=>u.filter((_,j)=>j!==i));

  const analyze = async () => {
    const valid = urls.filter(u=>u.trim());
    if (!valid.length) return;
    if (!apiKey) { setError('Configura tu API Key de Anthropic primero (botón en la barra lateral).'); return; }
    setLoading(true); setError(''); setResults([]);
    try {
      const prompt = `Eres experto en Amazon FBA y análisis de productos de Alibaba/AliExpress.

El usuario quiere analizar estos productos de proveedores:
${valid.map((u,i)=>`${i+1}. ${u}`).join('\n')}

Para CADA URL, extrae o estima (basado en el tipo de URL y contexto de mercado):
- Nombre específico del producto
- Precio proveedor en USD (rango min-max para pedidos de 100-500 unidades)
- Categoría del producto
- FBA fee estimado (pequeño: $4.59, mediano: $5.58, grande: $6.80-8.00)
- Precio de venta recomendado en Amazon (margen neto objetivo 15-25% después de fees)
- Margen neto estimado como decimal (0.18 = 18%)
- ROI estimado como decimal
- Potencial de ventas: "Alto", "Medio" o "Bajo"
- Justificación de 1 frase
- 3 competidores en Amazon con precios estimados
- Recomendación breve de 2 frases

Responde ÚNICAMENTE con este JSON exacto (sin texto extra ni markdown):
{"products":[{"url":"url original","name":"nombre","supplierMin":5.00,"supplierMax":8.00,"category":"categoria","fbaFee":5.58,"recommendedPrice":29.99,"margin":0.22,"roi":0.65,"potential":"Alto","justification":"texto","competitors":[{"name":"nombre","price":27.99}],"recommendation":"texto"}]}`;

      const res = await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST', headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01'},
        body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:2500,messages:[{role:'user',content:prompt}]})
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      const text = data.content.map(c=>c.text||'').join('');
      const clean = text.replace(/```json|```/g,'').trim();
      const parsed = JSON.parse(clean);
      setResults(parsed.products||[]);
    } catch(e) { setError(`Error al analizar: ${e.message}`); }
    finally { setLoading(false); }
  };

  const addProduct = r => {
    const p = { id:Date.now()+Math.random(), name:r.name,
      cost:(r.supplierMin+r.supplierMax)/2, unitsM1:10,
      fbaFee:r.fbaFee, price:r.recommendedPrice, active:true };
    onChange(s=>({...s,products:[...s.products,p]}));
    alert(`✅ "${r.name}" agregado a Productos`);
  };

  const potClr = p=>({'Alto':'bg-emerald-50 text-emerald-700 border-emerald-200','Medio':'bg-amber-50 text-amber-700 border-amber-200','Bajo':'bg-red-50 text-red-700 border-red-200'}[p]||'bg-slate-50 text-slate-700 border-slate-200');

  return (
    <div className="space-y-5 fade-in">
      <div>
        <h1 className="text-2xl font-bold text-slate-900">Analizador de Proveedores</h1>
        <p className="text-sm text-slate-500">Analiza productos de Alibaba / AliExpress con IA y calcula precio óptimo de venta</p>
      </div>

      <div className="bg-white rounded-2xl p-5 border border-slate-100 shadow-sm">
        <p className="text-sm text-slate-600 mb-4 flex items-center gap-2">
          <Ic n="link" s={15} c="text-orange-400"/>
          Ingresa hasta 5 URLs de productos de proveedores:
        </p>
        <div className="space-y-2.5">
          {urls.map((u,i)=>(
            <div key={i} className="flex gap-2">
              <div className="flex-1 flex items-center gap-2 border border-slate-200 rounded-xl px-3 py-2.5 focus-within:border-orange-400 transition-colors">
                <Ic n="link" s={13} c="text-slate-300"/>
                <input value={u} onChange={e=>updUrl(i,e.target.value)}
                  placeholder={`Ej: https://www.alibaba.com/product-detail/...`}
                  className="flex-1 text-sm focus:outline-none bg-transparent text-slate-700"/>
              </div>
              {urls.length>1 && <button onClick={()=>rmUrl(i)} className="text-slate-300 hover:text-red-400 transition-colors p-2"><Ic n="x" s={16}/></button>}
            </div>
          ))}
        </div>
        <div className="flex items-center gap-3 mt-4">
          {urls.length<5 && (
            <button onClick={()=>setUrls(u=>[...u,''])} className="text-sm text-orange-500 hover:text-orange-600 font-semibold flex items-center gap-1">
              <Ic n="plus" s={14}/> Agregar URL
            </button>
          )}
          <button onClick={analyze} disabled={loading||!urls.some(u=>u.trim())}
            className="ml-auto flex items-center gap-2 bg-orange-500 hover:bg-orange-600 disabled:opacity-50 disabled:cursor-not-allowed text-white px-5 py-2.5 rounded-xl text-sm font-semibold transition-colors">
            {loading
              ? <><div className="w-4 h-4 border-2 border-white/30 border-t-white rounded-full spin"/>Analizando...</>
              : <><Ic n="search" s={15}/>Analizar con IA</>}
          </button>
        </div>
        {error && (
          <div className="mt-3 bg-red-50 border border-red-200 text-red-600 rounded-xl px-4 py-3 text-sm flex items-start gap-2">
            <Ic n="warn" s={15} c="flex-shrink-0 mt-0.5"/>
            {error}
          </div>
        )}
      </div>

      {results.map((r,i)=>(
        <div key={i} className="bg-white rounded-2xl p-5 border border-slate-100 shadow-sm fade-in">
          <div className="flex items-start justify-between gap-3 mb-4">
            <div className="flex-1 min-w-0">
              <h3 className="font-bold text-slate-900 text-base">{r.name}</h3>
              <p className="text-xs text-slate-400 truncate mt-0.5">{r.url}</p>
            </div>
            <span className={`flex-shrink-0 text-xs font-bold px-3 py-1 rounded-full border ${potClr(r.potential)}`}>{r.potential}</span>
          </div>
          <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-4">
            <div className="bg-slate-50 rounded-xl p-3">
              <div className="text-xs text-slate-400 mb-1">Precio Proveedor</div>
              <div className="font-bold text-slate-800">${r.supplierMin?.toFixed(2)} – ${r.supplierMax?.toFixed(2)}</div>
            </div>
            <div className="bg-blue-50 rounded-xl p-3">
              <div className="text-xs text-blue-500 mb-1">Precio Venta Amazon</div>
              <div className="font-bold text-blue-800">{$d(r.recommendedPrice)}</div>
            </div>
            <div className={`rounded-xl p-3 ${r.margin>0.15?'bg-emerald-50':'bg-amber-50'}`}>
              <div className={`text-xs mb-1 ${r.margin>0.15?'text-emerald-500':'text-amber-500'}`}>Margen Neto Est.</div>
              <div className={`font-bold ${r.margin>0.15?'text-emerald-800':'text-amber-800'}`}>{pct(r.margin)}</div>
            </div>
            <div className="bg-purple-50 rounded-xl p-3">
              <div className="text-xs text-purple-400 mb-1">FBA Fee Est.</div>
              <div className="font-bold text-purple-800">{$d(r.fbaFee)}</div>
            </div>
          </div>
          <div className="bg-amber-50 border border-amber-100 rounded-xl p-3 text-sm text-amber-800 mb-3">{r.recommendation}</div>
          {r.competitors?.length>0 && (
            <div className="mb-4">
              <p className="text-xs font-semibold text-slate-400 mb-2">Competidores en Amazon:</p>
              <div className="flex flex-wrap gap-2">
                {r.competitors.map((c,j)=>(
                  <span key={j} className="text-xs bg-slate-100 text-slate-600 px-3 py-1 rounded-full">{c.name} · {$d(c.price)}</span>
                ))}
              </div>
            </div>
          )}
          <button onClick={()=>addProduct(r)}
            className="w-full flex items-center justify-center gap-2 bg-orange-500 hover:bg-orange-600 text-white py-2.5 rounded-xl text-sm font-bold transition-colors">
            <Ic n="plus" s={15}/> Agregar a Mis Productos y al Plan
          </button>
        </div>
      ))}
    </div>
  );
};

Responde SIEMPRE en español. Sé entusiasta, usa emojis. No menciones el bloque JSON al usuario.`;

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01'},
        body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:2500,system:sys,
          messages:history.map(m=>({role:m.role,content:m.content}))})
      });
      const data = await res.json();
      if(data.error) throw new Error(data.error.message);
      let full = data.content.map(c=>c.text||'').join('');
      const match = full.match(/<SP_SUGGESTIONS>([\s\S]*?)<\/SP_SUGGESTIONS>/);
      if(match){
        try {
          const parsed = JSON.parse(match[1]);
          setSugs(parsed); setPhase('select');
        } catch(e) {}
        full = full.replace(/<SP_SUGGESTIONS>[\s\S]*?<\/SP_SUGGESTIONS>/,'').trim();
      }
      setMsgs(m=>[...m,{role:'assistant',content:full}]);
    } catch(e){ setMsgs(m=>[...m,{role:'assistant',content:`❌ Error: ${e.message}`}]); }
    finally{ setLoading(false); }
  };

  const toggleSel = id => setSel(s=>s.includes(id)?s.filter(x=>x!==id):s.length<5?[...s,id]:s);

  const buildPlan = () => {
    const chosen = sugs.filter(s=>sel.includes(s.id));
    const products = chosen.map((p,i)=>({
      id:Date.now()+i, name:p.name, cost:p.supplierPrice,
      unitsM1:p.unitsM1||10, fbaFee:p.fbaFee||5.58,
      price:p.amazonPrice, active:true
    }));
    const sim = { ...mkSim(`Plan IA - ${chosen.map(p=>p.category||p.name.split(' ')[0]).join(', ')}`), products };
    setMsgs(m=>[...m,{role:'user',content:`He seleccionado ${chosen.length} productos.`},
      {role:'assistant',content:`🚀 **¡Plan de negocio creado exitosamente!**\n\nHe configurado proyecciones a 12 meses para los ${chosen.length} productos seleccionados. Puedes ver todos los detalles en el **Dashboard** y ajustar cualquier variable desde **Configuración**.\n\n¡Mucho éxito en tu negocio Amazon! 🎯`}]);
    setSugs([]); setSel([]); setPhase('done');
    setTimeout(()=>onPlanCreated(sim),800);
  };

  const renderMd = (text) => text.split('\n').map((l,i)=>{
    const bold = l.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
    return <p key={i} className="leading-relaxed mb-0.5" dangerouslySetInnerHTML={{__html:bold||'&nbsp;'}}/>;
  });

  return (
    <div className="space-y-4 fade-in flex flex-col" style={{height:'calc(100vh - 120px)'}}>
      <div>
        <h1 className="text-2xl font-bold text-slate-900">Iniciar con IA</h1>
        <p className="text-sm text-slate-500">Encuentra productos ganadores y genera tu plan de negocio automáticamente</p>
      </div>

      <div className="flex-1 bg-white rounded-2xl border border-slate-100 shadow-sm flex flex-col overflow-hidden">
        {/* Messages */}
        <div className="flex-1 overflow-y-auto p-5 space-y-4">
          {msgs.map((m,i)=>(
            <div key={i} className={`flex gap-3 ${m.role==='user'?'flex-row-reverse':''} fade-in`}>
              <div className={`w-8 h-8 rounded-full flex-shrink-0 flex items-center justify-center text-xs font-bold ${m.role==='user'?'bg-orange-500 text-white':'bg-gradient-to-br from-amber-400 to-orange-600 text-white'}`}>
                {m.role==='user'?'Tú':<Ic n="sparkle" s={14}/>}
              </div>
              <div className={`max-w-xl px-4 py-3 rounded-2xl text-sm leading-relaxed ${m.role==='user'?'bg-orange-500 text-white rounded-tr-none':'bg-slate-100 text-slate-800 rounded-tl-none'}`}>
                {renderMd(m.content)}
              </div>
            </div>
          ))}
          {loading && (
            <div className="flex gap-3">
              <div className="w-8 h-8 rounded-full bg-gradient-to-br from-amber-400 to-orange-600 flex items-center justify-center">
                <Ic n="sparkle" s={14} c="text-white"/>
              </div>
              <div className="bg-slate-100 px-5 py-4 rounded-2xl rounded-tl-none">
                <div className="flex gap-1.5 items-center">
                  <div className="w-2 h-2 bg-slate-400 rounded-full dot1"/>
                  <div className="w-2 h-2 bg-slate-400 rounded-full dot2"/>
                  <div className="w-2 h-2 bg-slate-400 rounded-full dot3"/>
                </div>
              </div>
            </div>
          )}
          <div ref={bottom}/>
        </div>

        {/* Product Suggestions */}
        {sugs.length>0 && phase==='select' && (
          <div className="border-t border-slate-100 p-4 bg-slate-50">
            <div className="flex items-center justify-between mb-3">
              <p className="text-sm font-bold text-slate-700">Selecciona hasta 5 productos ({sel.length} seleccionados):</p>
            </div>
            <div className="space-y-2 max-h-52 overflow-y-auto pr-1">
              {sugs.map(s=>(
                <div key={s.id} onClick={()=>toggleSel(s.id)}
                  className={`cursor-pointer flex items-center gap-3 p-3 rounded-xl border-2 transition-all ${sel.includes(s.id)?'border-orange-400 bg-orange-50':'border-slate-200 bg-white hover:border-slate-300'}`}>
                  <div className={`w-5 h-5 flex-shrink-0 rounded-md border-2 flex items-center justify-center ${sel.includes(s.id)?'bg-orange-500 border-orange-500':'border-slate-300'}`}>
                    {sel.includes(s.id)&&<Ic n="check" s={11} c="text-white"/>}
                  </div>
                  <div className="flex-1 min-w-0">
                    <div className="text-sm font-bold text-slate-800 truncate">{s.name}</div>
                    <div className="text-xs text-slate-400 truncate">{s.description}</div>
                  </div>
                  <div className="flex-shrink-0 text-right">
                    <div className={`text-xs font-bold ${s.margin>0.15?'text-emerald-600':'text-amber-600'}`}>{pct(s.margin)}</div>
                    <div className={`text-xs px-2 py-0.5 rounded-full mt-0.5 ${s.potential==='Alto'?'bg-emerald-100 text-emerald-700':s.potential==='Medio'?'bg-amber-100 text-amber-700':'bg-red-100 text-red-700'}`}>
                      {s.potential}
                    </div>
                  </div>
                </div>
              ))}
            </div>
            <button onClick={buildPlan} disabled={!sel.length}
              className="w-full mt-3 bg-gradient-to-r from-orange-500 to-amber-500 disabled:opacity-40 disabled:cursor-not-allowed text-white py-3 rounded-xl font-bold text-sm flex items-center justify-center gap-2 hover:shadow-lg hover:shadow-orange-100 transition-all">
              <Ic n="sparkle" s={16}/> Crear Plan de Negocio con {sel.length} producto{sel.length!==1?'s':''} seleccionado{sel.length!==1?'s':''}
            </button>
          </div>
        )}

        {/* Input */}
        <div className="border-t border-slate-100 p-4 flex gap-2">
          <input value={input} onChange={e=>setInput(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&!e.shiftKey&&send(input)}
            placeholder="Escribe qué quieres vender en Amazon..."
            className="flex-1 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-orange-400 transition-colors"
            disabled={loading}/>
          <button onClick={()=>send(input)} disabled={loading||!input.trim()}
            className="bg-orange-500 hover:bg-orange-600 disabled:opacity-40 text-white px-4 py-2.5 rounded-xl transition-colors">
            <Ic n="send" s={18}/>
          </button>
        </div>
      </div>
    </div>
  );
};

/* ═══════════════════════════════════════════════════════════
   SIMULATIONS
═══════════════════════════════════════════════════════════ */
const Simulations = ({ sims, current, onLoad, onCreate, onDelete, onRename }) => {
  const [renId, setRenId] = useState(null);
  const [renName, setRenName] = useState('');
  return (
    <div className="space-y-4 fade-in">
      <div className="flex items-center justify-between">
        <div>
          <h1 className="text-2xl font-bold text-slate-900">Simulaciones</h1>
          <p className="text-sm text-slate-500">Guarda, compara y gestiona tus planes de negocio</p>
        </div>
        <button onClick={onCreate} className="flex items-center gap-2 bg-orange-500 hover:bg-orange-600 text-white px-4 py-2.5 rounded-xl text-sm font-semibold transition-colors">
          <Ic n="plus" s={16}/> Nueva Simulación
        </button>
      </div>

      {sims.length===0 && (
        <div className="bg-white rounded-2xl p-12 text-center border border-slate-100">
          <Ic n="folder" s={48} c="text-slate-200 mx-auto mb-3"/>
          <p className="text-slate-400 text-sm">No hay simulaciones guardadas. Haz clic en "Guardar" para guardar la actual.</p>
        </div>
      )}

      <div className="grid gap-3">
        {sims.map(sim=>{
          const months = buildMonths(sim.products.filter(p=>p.active), sim.cfg);
          const totRev = months.reduce((s,m)=>s+m.rev,0);
          const totNet = months.reduce((s,m)=>s+m.netTax,0);
          const isCur  = current?.id===sim.id;
          return (
            <div key={sim.id} className={`bg-white rounded-2xl p-5 border-2 shadow-sm transition-all ${isCur?'border-orange-400':'border-slate-100 hover:border-slate-200'}`}>
              <div className="flex items-start justify-between gap-3">
                <div className="flex-1 min-w-0">
                  {renId===sim.id ? (
                    <div className="flex gap-2 items-center">
                      <input value={renName} onChange={e=>setRenName(e.target.value)} autoFocus
                        className="border border-orange-300 rounded-lg px-2 py-1 text-sm focus:outline-none flex-1"/>
                      <button onClick={()=>{onRename(sim.id,renName);setRenId(null);}} className="text-orange-500 text-xs font-bold">OK</button>
                      <button onClick={()=>setRenId(null)} className="text-slate-400 text-xs">✕</button>
                    </div>
                  ) : (
                    <div className="flex items-center gap-2 flex-wrap">
                      <h3 className="font-bold text-slate-900">{sim.name}</h3>
                      {isCur && <span className="text-xs bg-orange-100 text-orange-600 px-2 py-0.5 rounded-full font-semibold">Activa</span>}
                    </div>
                  )}
                  <p className="text-xs text-slate-400 mt-1">
                    {sim.products.filter(p=>p.active).length} productos activos · {new Date(sim.updatedAt).toLocaleDateString('es-CO',{day:'2-digit',month:'short',year:'numeric'})}
                  </p>
                </div>
                <div className="text-right flex-shrink-0">
                  <div className="text-sm font-bold text-slate-900">{$(totRev)}</div>
                  <div className={`text-xs font-bold ${totNet>0?'text-emerald-600':'text-red-600'}`}>{$(totNet)} neto</div>
                </div>
              </div>
              <div className="flex gap-2 mt-4">
                {!isCur && <button onClick={()=>onLoad(sim)} className="flex-1 bg-orange-500 hover:bg-orange-600 text-white py-2 rounded-xl text-xs font-bold transition-colors">Abrir</button>}
                <button onClick={()=>{setRenId(sim.id);setRenName(sim.name);}} className="px-3 py-2 bg-slate-100 hover:bg-slate-200 text-slate-500 rounded-xl transition-colors"><Ic n="edit" s={14}/></button>
                <button onClick={()=>onDelete(sim.id)} className="px-3 py-2 bg-red-50 hover:bg-red-100 text-red-400 rounded-xl transition-colors"><Ic n="trash" s={14}/></button>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
};

/* ═══════════════════════════════════════════════════════════
   API KEY MODAL
═══════════════════════════════════════════════════════════ */
const ApiModal = ({ val, onSave, onClose }) => {
  const [k, setK] = useState(val||'');
  return (
    <div className="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-50 p-4">
      <div className="bg-white rounded-2xl p-6 w-full max-w-md shadow-2xl fade-in">
        <div className="flex items-center gap-3 mb-5">
          <div className="w-10 h-10 bg-orange-100 rounded-xl flex items-center justify-center"><Ic n="key" c="text-orange-500" s={20}/></div>
          <div>
            <h2 className="font-bold text-slate-900">API Key de Anthropic</h2>
            <p className="text-xs text-slate-500">Necesaria para funciones de IA</p>
          </div>
        </div>
        <input type="password" value={k} onChange={e=>setK(e.target.value)}
          placeholder="sk-ant-api03-..." autoFocus
          className="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm font-mono focus:outline-none focus:border-orange-400 transition-colors mb-3"/>
        <p className="text-xs text-slate-400 mb-5">
          Tu clave se guarda solo en este navegador (localStorage). Obtenla gratis en{' '}
          <a href="https://console.anthropic.com" target="_blank" className="text-orange-500 underline">console.anthropic.com</a>
        </p>
        <div className="flex gap-2">
          <button onClick={()=>{onSave(k);onClose();}} className="flex-1 bg-orange-500 hover:bg-orange-600 text-white py-2.5 rounded-xl font-bold text-sm transition-colors">Guardar</button>
          <button onClick={onClose} className="px-5 py-2.5 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-xl text-sm transition-colors">Cancelar</button>
        </div>
      </div>
    </div>
  );
};

/* ═══════════════════════════════════════════════════════════
   ROOT APP
═══════════════════════════════════════════════════════════ */
function App() {
  const [sims, setSims]     = useState(()=>{ try{return JSON.parse(localStorage.getItem('sp_sims')||'[]')}catch{return []} });
  const [cur,  setCur]      = useState(()=>{ try{const s=JSON.parse(localStorage.getItem('sp_cur'));if(s)return s}catch{}; return mkSim('Mi Primer Plan de Negocio') });
  const [tab,  setTab]      = useState('dashboard');
  const [apiKey, setApiKey] = useState(()=>localStorage.getItem('sp_apikey')||'');
  const [showApi, setShowApi] = useState(false);
  const [saved, setSaved]   = useState(false);

  useEffect(()=>{ try{localStorage.setItem('sp_sims',JSON.stringify(sims))}catch{} },[sims]);
  useEffect(()=>{ try{localStorage.setItem('sp_cur',JSON.stringify(cur))}catch{} },[cur]);

  const save = () => {
    const upd = {...cur, updatedAt:new Date().toISOString()};
    setCur(upd);
    setSims(prev=>{ const ex=prev.find(s=>s.id===upd.id); return ex?prev.map(s=>s.id===upd.id?upd:s):[...prev,upd]; });
    setSaved(true); setTimeout(()=>setSaved(false),1800);
  };

  const handleChange = updater => setCur(prev => typeof updater==='function'?updater(prev):updater);

  const createNew = () => {
    const s = mkSim();
    setCur(s); setSims(p=>[...p,s]); setTab('dashboard');
  };

  const handlePlanCreated = sim => {
    setCur(sim); setSims(p=>[...p,sim]); setTab('dashboard');
  };

  const nav = [
    { id:'dashboard',    label:'Dashboard',     icon:'dashboard' },
    { id:'products',     label:'Productos',      icon:'box' },
    { id:'supplier',     label:'Proveedores IA', icon:'link' },
    { id:'ai',           label:'Iniciar con IA', icon:'sparkle', badge:true },
    { id:'settings',     label:'Configuración',  icon:'settings' },
    { id:'simulations',  label:'Simulaciones',   icon:'folder' },
  ];

  return (
    <div className="flex h-screen overflow-hidden bg-slate-50" style={{fontFamily:"'Sora',sans-serif"}}>

      {/* ── SIDEBAR ── */}
      <aside className="w-56 bg-slate-950 flex flex-col flex-shrink-0 select-none">
        {/* Brand */}
        <div className="px-4 py-5 border-b border-white/5">
          <div className="flex items-center gap-3">
            <Logo size={34}/>
            <div>
              <span className="text-white font-bold text-sm">Seller</span>
              <span className="text-orange-400 font-extrabold text-sm">Plus</span>
              <div className="text-slate-600 text-[10px] tracking-widest uppercase">Forecast</div>
            </div>
          </div>
        </div>

        {/* Active sim */}
        <div className="px-4 py-3 border-b border-white/5">
          <div className="text-[10px] text-slate-600 uppercase tracking-wider mb-0.5">Simulación activa</div>
          <div className="text-xs text-slate-300 font-medium truncate" title={cur.name}>{cur.name}</div>
        </div>

        {/* Nav */}
        <nav className="flex-1 px-2.5 py-3 space-y-0.5 overflow-y-auto">
          {nav.map(n=>(
            <button key={n.id} onClick={()=>setTab(n.id)}
              className={`sidebar-item w-full flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-xs font-semibold
                ${tab===n.id?'bg-orange-500 text-white':n.badge?'text-amber-400 hover:bg-white/5':'text-slate-400 hover:bg-white/5 hover:text-slate-200'}`}>
              <Ic n={n.icon} s={16}/>
              <span className="truncate">{n.label}</span>
              {n.badge&&<span className="ml-auto text-[9px] bg-amber-400/20 text-amber-300 px-1.5 py-0.5 rounded-full uppercase tracking-wide">IA</span>}
            </button>
          ))}
        </nav>

        {/* Bottom */}
        <div className="px-2.5 py-3 border-t border-white/5 space-y-1.5">
          <button onClick={save}
            className={`w-full flex items-center justify-center gap-2 py-2.5 rounded-xl text-xs font-bold transition-all
              ${saved?'bg-emerald-500/20 text-emerald-400':'bg-orange-500/15 hover:bg-orange-500/25 text-orange-400'}`}>
            <Ic n={saved?'check':'save'} s={14}/>
            {saved?'¡Guardado!':'Guardar'}
          </button>
          <button onClick={createNew}
            className="w-full flex items-center justify-center gap-1.5 py-2 text-slate-600 hover:text-slate-400 text-[11px] transition-colors">
            <Ic n="plus" s={12}/> Nueva simulación
          </button>
          <button onClick={()=>setShowApi(true)}
            className="w-full flex items-center justify-center gap-1.5 py-2 text-slate-700 hover:text-slate-500 text-[11px] transition-colors">
            <Ic n="key" s={12}/>
            {apiKey?<span className="text-emerald-600">● API Key activa</span>:'Configurar API Key'}
          </button>
        </div>
      </aside>

      {/* ── MAIN ── */}
      <main className="flex-1 overflow-y-auto">
        <div className="max-w-7xl mx-auto p-6">
          {tab==='dashboard'   && <Dashboard   sim={cur}/>}
          {tab==='products'    && <Products    sim={cur} onChange={handleChange}/>}
          {tab==='supplier'    && <SupplierAnalyzer sim={cur} onChange={handleChange} apiKey={apiKey}/>}
          {tab==='ai'          && <AIFinder    onPlanCreated={handlePlanCreated} apiKey={apiKey}/>}
          {tab==='settings'    && <Settings    sim={cur} onChange={handleChange}/>}
          {tab==='simulations' && <Simulations sims={sims} current={cur}
              onLoad={s=>{setCur(s);setTab('dashboard');}}
              onCreate={createNew}
              onDelete={id=>setSims(p=>p.filter(s=>s.id!==id))}
              onRename={(id,nm)=>{
                setSims(p=>p.map(s=>s.id===id?{...s,name:nm}:s));
                if(cur.id===id) setCur(p=>({...p,name:nm}));
              }}/>}
        </div>
      </main>

      {showApi && <ApiModal val={apiKey} onSave={k=>{setApiKey(k);localStorage.setItem('sp_apikey',k);}} onClose={()=>setShowApi(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
